; ESP32 + SSD1306 OLED 显示 Claude/Codex 额度。
; 默认目标是 ESP32-C3；如果你用 S3，改用 [env:esp32-s3] 那个环境（pio run -e esp32-s3）。
; C3/S3 都是原生 USB-CDC：一根 USB 线既供电又当串口。

[platformio]
default_envs = esp32-c3

[common]
framework = arduino
monitor_speed = 115200
lib_deps =
    olikraus/U8g2 @ ^2.35.19
    bblanchon/ArduinoJson @ ^7.2.0

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps = ${common.lib_deps}
; 让 USB 口在启动时就当作 Serial（CDC）。
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DPIN_SDA=4
    -DPIN_SCL=3

[env:esp32-s3]
platform = espressif32
board = lolin_s3
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps = ${common.lib_deps}
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DPIN_SDA=4
    -DPIN_SCL=3
